name: Build Clang

on:
    push:
        branches: [ clang ]

jobs:
    build:
        runs-on: ubuntu-latest
        container:
            image: alpine:latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: what?
              run: ls
            
            - name: what?
              run: ls infra
            
            - name: what?
              run: ls infra/llvm
            
            - name: Build LLVM
              run: ./infra/llvm/build_llvm_linux.sh
